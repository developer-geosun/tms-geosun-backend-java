spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:tms_auth_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  security:
    jwt:
      secret: test-jwt-secret-must-be-at-least-32-bytes-long!!

logging:
  level:
    root: WARN
    com.geosun.tms: INFO
