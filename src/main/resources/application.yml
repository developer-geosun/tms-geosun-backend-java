spring:
  application:
    name: tms-geosun-backend-java
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tms_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:tms_user}
    password: ${DB_PASSWORD:tms_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET:replace-me-with-strong-secret-of-at-least-32-characters}
      issuer: ${JWT_ISSUER:}
      audience: ${JWT_AUDIENCE:}
      expires-seconds: ${JWT_EXPIRES_SECONDS:900}
      refresh-expires-seconds: ${JWT_REFRESH_EXPIRES_SECONDS:604800}
  email:
    from: ${MAIL_FROM:no-reply@example.com}
    verification-expires-seconds: ${EMAIL_VERIFICATION_EXPIRES_SECONDS:86400}
  rate-limit:
    login-max-attempts: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
    login-window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:900}
    resend-verification-seconds: ${RATE_LIMIT_RESEND_VERIFICATION_SECONDS:60}
    refresh-max-requests: ${RATE_LIMIT_REFRESH_MAX_REQUESTS:30}
    refresh-window-seconds: ${RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
    register-max-per-window: ${RATE_LIMIT_REGISTER_MAX_PER_WINDOW:30}
  cleanup:
    token-retention-days: ${TOKEN_CLEANUP_RETENTION_DAYS:30}
    cron: ${TOKEN_CLEANUP_CRON:0 0 2 * * *}
