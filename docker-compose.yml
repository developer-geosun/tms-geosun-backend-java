services:
  mysql:
    image: mysql:8.0
    container_name: tms-auth-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tms_auth}
      MYSQL_USER: ${MYSQL_USER:-tms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tms_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    # Зовнішній порт (ліворуч) — щоб не конфліктувати з локальним MySQL на 3306
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-tms_user}", "-p${MYSQL_PASSWORD:-tms_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tms-auth-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-tms_auth}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ${MYSQL_USER:-tms_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-tms_password}
      JWT_SECRET: ${JWT_SECRET:-replace-me-with-strong-secret-of-at-least-32-characters}
      JWT_ISSUER: ${JWT_ISSUER:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-900}
      JWT_REFRESH_EXPIRES_SECONDS: ${JWT_REFRESH_EXPIRES_SECONDS:-604800}
      EMAIL_VERIFICATION_EXPIRES_SECONDS: ${EMAIL_VERIFICATION_EXPIRES_SECONDS:-86400}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:-5}
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:-900}
      RATE_LIMIT_RESEND_VERIFICATION_SECONDS: ${RATE_LIMIT_RESEND_VERIFICATION_SECONDS:-60}
      RATE_LIMIT_REFRESH_MAX_REQUESTS: ${RATE_LIMIT_REFRESH_MAX_REQUESTS:-30}
      RATE_LIMIT_REFRESH_WINDOW_SECONDS: ${RATE_LIMIT_REFRESH_WINDOW_SECONDS:-60}
      TOKEN_CLEANUP_RETENTION_DAYS: ${TOKEN_CLEANUP_RETENTION_DAYS:-30}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  mysql_data:
